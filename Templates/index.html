<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #161616;
      --border:  #2a2a2a;
      --accent:  #c8f135;
      --accent2: #a8d420;
      --text:    #f0ede8;
      --sub:     #aaaaaa;
      --muted:   #666666;
      --red:     #ff5555;
      --radius:  4px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,241,53,0.06) 0%, transparent 70%);
      top: -160px; right: -160px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 28px;
    }

    header {
      padding: 48px 0 0;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
    }

    .logo-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #cccccc;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid #333333;
      padding: 3px 10px;
      border-radius: var(--radius);
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 0 80px;
      gap: 52px;
    }

    .headline { display: flex; flex-direction: column; gap: 14px; }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
      display: block;
    }

    .sub {
      font-size: 16px;
      color: #aaaaaa;
      letter-spacing: 0.01em;
      font-weight: 400;
    }

    .form-wrap { display: flex; flex-direction: column; gap: 10px; }

    .input-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      min-width: 0;
    }

    #url-input::placeholder { color: #555555; }

    #shorten-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      padding: 18px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #shorten-btn:hover  { background: var(--accent2); }
    #shorten-btn:active { transform: scale(0.97); }
    #shorten-btn.loading { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--red);
      padding: 0 2px;
      display: none;
    }
    .error-msg.show { display: block; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      animation: slideUp 0.28s ease;
    }
    .result-card.show { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      background: var(--accent);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-header span {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: #0a0a0a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .dot { width: 6px; height: 6px; background: #0a0a0a; border-radius: 50%; opacity: 0.35; }

    .result-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

    .result-row { display: flex; flex-direction: column; gap: 5px; }

    .result-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #999999;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .result-value {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      word-break: break-all;
    }

    .result-value.short { color: var(--accent); font-size: 20px; font-weight: 500; }

    .copy-row { display: flex; align-items: center; gap: 14px; }

    #copy-btn {
      background: transparent;
      border: 1px solid #333333;
      color: #cccccc;
      padding: 10px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: var(--radius);
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #copy-btn:hover  { border-color: var(--accent); color: var(--accent); }
    #copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    .history-section { display: none; flex-direction: column; gap: 14px; }
    .history-section.show { display: flex; }

    .history-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #999999;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-label::after { content: ''; flex: 1; height: 1px; background: #222222; }

    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border: 1px solid #1e1e1e;
      border-radius: var(--radius);
      background: var(--surface);
      animation: slideUp 0.22s ease;
    }

    .history-item-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

    .history-short {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    .history-long {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #999999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 400px;
    }

    .history-copy {
      background: none;
      border: none;
      color: #888888;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .history-copy:hover { color: var(--accent); }

    footer {
      padding: 24px 0 32px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #888888;
      letter-spacing: 0.08em;
      border-top: 1px solid #1e1e1e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (max-width: 560px) {
      .input-row { flex-direction: column; }
      #shorten-btn { width: 100%; text-align: center; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
      .history-long { max-width: 200px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="logo">Snip</div>
      <div class="logo-tag">URL Shortener</div>
    </header>

    <main>

      <div class="headline">
        <h1>Long URLs<em>Cut Short.</em></h1>
        <p class="sub">Paste any link below and get a clean, short URL instantly.</p>
      </div>

      <div class="form-wrap">
        <div class="input-row">
          <input
            id="url-input"
            type="url"
            placeholder="https://your-very-long-url.com/goes/here"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="shorten-btn" onclick="shortenUrl()">Shorten →</button>
        </div>
        <div class="error-msg" id="error-msg"></div>
      </div>

      <div class="result-card" id="result-card">
        <div class="result-header">
          <div class="dot"></div>
          <span>Link ready</span>
        </div>
        <div class="result-body">
          <div class="result-row">
            <div class="result-label">Short URL</div>
            <div class="copy-row">
              <div class="result-value short" id="result-short"></div>
              <button id="copy-btn" onclick="copyShort()">Copy</button>
            </div>
          </div>
          <div class="result-row">
            <div class="result-label">Original</div>
            <div class="result-value" id="result-long"></div>
          </div>
        </div>
      </div>

      <div class="history-section" id="history-section">
        <div class="history-label">This session</div>
        <div class="history-list" id="history-list"></div>
      </div>

    </main>

    <footer>
      <span>CodeAlpha — Task 01</span>
      <span>Flask + SQLite</span>
    </footer>

  </div>

  <script>
    const sessionHistory = [];

    async function shortenUrl() {
      const input = document.getElementById('url-input');
      const btn   = document.getElementById('shorten-btn');
      const err   = document.getElementById('error-msg');
      const url   = input.value.trim();

      err.textContent = '';
      err.classList.remove('show');

      if (!url) { showError('Please enter a URL.'); return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showError('URL must start with http:// or https://');
        return;
      }

      btn.textContent = 'Working…';
      btn.classList.add('loading');

      try {
        const res  = await fetch('/shorten', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ long_url: url }),
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

        showResult(data.short_url, data.long_url);
        addToHistory(data.short_url, data.long_url);
        input.value = '';

      } catch {
        showError('Could not reach the server. Is Flask running?');
      } finally {
        btn.textContent = 'Shorten →';
        btn.classList.remove('loading');
      }
    }

    function showError(msg) {
      const err = document.getElementById('error-msg');
      err.textContent = '⚠ ' + msg;
      err.classList.add('show');
    }

    function showResult(shortUrl, longUrl) {
      document.getElementById('result-short').textContent = shortUrl;
      document.getElementById('result-long').textContent  = longUrl;
      document.getElementById('result-card').classList.add('show');
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }

    function copyShort() {
      const short = document.getElementById('result-short').textContent;
      navigator.clipboard.writeText(short).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function addToHistory(shortUrl, longUrl) {
      sessionHistory.unshift({ shortUrl, longUrl });
      document.getElementById('history-section').classList.add('show');
      const list = document.getElementById('history-list');
      list.innerHTML = '';

      sessionHistory.slice(0, 8).forEach(item => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-item-left">
            <div class="history-short">${item.shortUrl}</div>
            <div class="history-long">${item.longUrl}</div>
          </div>
          <button class="history-copy" onclick="copyText('${item.shortUrl}', this)">copy</button>
        `;
        list.appendChild(el);
      });
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'done ✓';
        setTimeout(() => btn.textContent = 'copy', 1500);
      });
    }

    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
  </script>
</body>
</html>
